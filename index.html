		<style>
			/* Login overlay styles */
			#login-overlay {
				position: fixed;
				top: 0;

			.login-container {

		<script>
			// ============================================
			// CONFIGURATION - Replace with your values
			// ============================================
			const CONFIG = {
				// TODO: Replace with your Google OAuth Client ID from Google Cloud Console
				GOOGLE_CLIENT_ID: '313123590702-lb7fjsbbqt83t3ljocvpf5la58uqmir4.apps.googleusercontent.com',
				
				// Your Cloudflare Worker endpoint
				WORKER_URL: 'https://checkaccess.carlo587-jcl.workers.dev',
				
				// App ID for access rules
				APP_ID: 'minecraft',
				
				// Allowed email domain
				ALLOWED_DOMAIN: 'felice.ed.jp'
			};
			// ============================================

			let gameInitialized = false;
			let currentUser = null;
			let constructedUsername = null;
			let currentIdToken = null;
			let assetsChecksum = null;
			const ACCESS_RECHECK_INTERVAL_MS = 60000;
			const PLAYTIME_HEARTBEAT_INTERVAL_MS = 5 * 60 * 1000; // 5 minutes
			let periodicAccessCheckTimer = null;
			let playtimeHeartbeatTimer = null;
			let periodicAccessCheckInFlight = false;
			let transientAccessFailureCount = 0;
			let accessRevoked = false;

			/** Fixed viewport for iPad "Request Desktop" – slightly larger so touch controls are a bit bigger but still comfortably visible. */
			const IPAD_DESKTOP_VIEWPORT = { portraitW: 650, portraitH: 1200 };

			/**
			 * Detect iPad with "Request Desktop Site" (iPadOS 13+ reports Macintosh UA but device is touch).
			 * Used to force a mobile-sized viewport so touch button sizes match normal mobile mode.
			 */
			function isIPadDesktopMode() {
				const ua = navigator.userAgent.toLowerCase();
				const originalUA = navigator.userAgent;
				const hasTouch = navigator.maxTouchPoints > 1 || 'ontouchstart' in window;
				const looksLikeDesktopUA = /macintosh/i.test(ua) && !/mobile/i.test(ua) && !originalUA.includes('iPad');
				const looksLikeSafari = /safari/i.test(ua) && !/(windows|linux|chromeos)/i.test(ua);
				return hasTouch && looksLikeDesktopUA && looksLikeSafari;
			}

			/**
			 * Wrap the game in a fixed mobile-sized viewport when on iPad desktop mode.
			 * Uses fixed pixel size (no transform scale) so touch coordinates stay correct.
			 * Centered with black letterboxing; orientation changes swap width/height.
			 */
			function applyMobileViewportForIPadDesktop() {
				const gameFrame = document.getElementById('game_frame');
				if (!gameFrame || document.getElementById('game_viewport_wrapper')) return;

				const { portraitW, portraitH } = IPAD_DESKTOP_VIEWPORT;
				function isLandscape() { return window.innerWidth >= window.innerHeight; }
				function setInnerSize(inner) {
					if (isLandscape()) {
						inner.style.width = portraitH + 'px';
						inner.style.height = portraitW + 'px';
					} else {
						inner.style.width = portraitW + 'px';
						inner.style.height = portraitH + 'px';
					}
				}

				const wrapper = document.createElement('div');
				wrapper.id = 'game_viewport_wrapper';
				wrapper.setAttribute('style',
					'position:fixed;inset:0;display:flex;justify-content:center;align-items:center;background:#000;');
				const inner = document.createElement('div');
				inner.id = 'game_viewport_inner';
				setInnerSize(inner);
				gameFrame.style.width = '100%';
				gameFrame.style.height = '100%';
				inner.appendChild(gameFrame);
				wrapper.appendChild(inner);
				document.body.appendChild(wrapper);

				window.addEventListener('resize', function onResize() {
					const innerEl = document.getElementById('game_viewport_inner');
					if (innerEl) setInnerSize(innerEl);
				});
			}

			/**
			 * Detect if device is mobile, tablet, or iPad
			 * Returns true if device should be blocked
			 */
			function isMobileDevice() {
				const ua = navigator.userAgent.toLowerCase();
				const originalUA = navigator.userAgent; // Keep original for case-sensitive checks
				
				// IMPORTANT: Check for iPad FIRST (before desktop OS check)
				// Modern iPads (iPadOS 13+) report "Macintosh" in User-Agent to get desktop sites
				// Detection methods:
				// 1. Explicit "iPad" in User-Agent (older iPads)
				// 2. Macintosh + Safari + no Windows/Linux + touch support (newer iPads)
				const isIPad = /ipad/i.test(ua) || 
				               originalUA.includes('iPad') ||
				               (/macintosh/i.test(ua) && /safari/i.test(ua) && !/(windows|linux|chromeos)/i.test(ua) && 
				                !/mobile/i.test(ua) && !/iphone/i.test(ua) && 
				                (navigator.maxTouchPoints > 1 || 'ontouchstart' in window));
				
				if (isIPad) {
					return true; // Block iPad
				}
				
				// Check for other tablets
				const isAndroidTablet = /android/i.test(ua) && !/mobile/i.test(ua) && !/(windows|macintosh|linux|chromeos)/i.test(ua);
				const isOtherTablet = /(tablet|kindle|playbook)/i.test(ua) && !/(windows|macintosh|linux|chromeos)/i.test(ua);
				
				if (isAndroidTablet || isOtherTablet) {
					return true; // Block tablets
				}
				
				// Check for mobile devices (be more specific to avoid false positives)
				const isMobile = /(iphone|ipod|android.*mobile|blackberry|iemobile|opera mini|mobile)/i.test(ua) && 
				                 !/(windows|macintosh|linux|chromeos)/i.test(ua);
				
				if (isMobile) {
					return true; // Block mobile
				}
				
				// If we get here, it's likely a desktop (already checked for iPad above)
				return false;
			}

			/**
			 * Show device blocking message
			 */
			function showDeviceBlockMessage() {
				const loginOverlay = document.getElementById('login-overlay');
				const loginContainer = document.querySelector('.login-container');
				
				if (loginOverlay && loginContainer) {
					loginContainer.innerHTML = `
						<div class="device-block-icon">📱</div>
						<h1 class="login-title">Device Not Supported</h1>
						<div class="device-block-message">
							<p><strong>This game requires a desktop or laptop computer.</strong></p>
							<p>Mobile devices, tablets, and iPads are not supported due to performance limitations and may experience significant lag.</p>
							<p>Please access this game from a desktop or laptop computer for the best experience.</p>
						</div>
					`;
				}
			}

			/**
			 * Initialize Google Sign-In when the library loads
			 */
			function initGoogleSignIn() {
				if (typeof google === 'undefined') {
					// Google library not loaded yet, retry
					setTimeout(initGoogleSignIn, 100);
					return;
				}

				google.accounts.id.initialize({
					client_id: CONFIG.GOOGLE_CLIENT_ID,
					callback: handleGoogleSignIn,
					auto_select: true,  // Auto sign-in if user previously signed in
					cancel_on_tap_outside: false
				});

				// Render the sign-in button
				google.accounts.id.renderButton(
					document.getElementById('google-signin-btn'),
					{
						theme: 'filled_blue',
						size: 'large',
						text: 'signin_with',
						shape: 'rectangular',
						width: 280
					}
				);

				// Also show One Tap prompt
				google.accounts.id.prompt();
			}

			/**
			 * Handle Google Sign-In callback
			 */
			async function handleGoogleSignIn(response) {
				showLoading(true);
				hideError();

				try {
					// Decode the JWT to get user info (for display only - verification happens server-side)
					const payload = parseJwt(response.credential);
					
					// Quick client-side domain check (server will verify too)
					if (!payload.email.endsWith('@' + CONFIG.ALLOWED_DOMAIN)) {
						showError(`Only @${CONFIG.ALLOWED_DOMAIN} accounts are allowed`);
						showLoading(false);
						return;
					}

					// Username is now constructed server-side for security
					// It will be received from the server response

					currentUser = {
						email: payload.email,
						name: payload.name,
						picture: payload.picture,
						idToken: response.credential
					};

					// Check access with the worker
					await checkAccessWithToken(response.credential);

				} catch (err) {
					console.error('Sign-in error:', err);
					showError('Sign-in failed. Please try again.');
					showLoading(false);
				}
			}

			/**
			 * Perform authenticated access check against worker
			 */
			async function fetchAccessDecision(idToken) {
				try {
					const response = await fetch(`${CONFIG.WORKER_URL}/check-access`, {
						method: 'POST',
						headers: { 'Content-Type': 'application/json' },
						body: JSON.stringify({
							idToken: idToken,
							appId: CONFIG.APP_ID,
							timezone: Intl.DateTimeFormat().resolvedOptions().timeZone
						})
					});

					let result = null;
					try {
						result = await response.json();
					} catch (err) {
						return {
							type: 'transient',
							reason: 'Invalid response from access service'
						};
					}

					if (result && result.allowed === true) {
						return {
							type: 'allowed',
							result: result
						};
					}

					if (result && result.allowed === false) {
						return {
							type: 'denied',
							reason: result.reason || result.message || 'Access denied',
							result: result
						};
					}

					// 401 = token expired/invalid — treat as transient so periodic playtime check doesn't kick the user
					if (response.status === 401) {
						return {
							type: 'transient',
							reason: (result && (result.message || result.error)) || 'Authentication expired',
							result: result
						};
					}

					// 403 = policy deny (e.g. outside playtime) — revoke access
					if (response.status === 403) {
						return {
							type: 'denied',
							reason: (result && (result.message || result.error)) || 'Access denied',
							result: result
						};
					}

					return {
						type: 'transient',
						reason: (result && (result.message || result.error)) || 'Could not verify access right now'
					};
				} catch (err) {
					return {
						type: 'transient',
						reason: 'Could not verify access right now'
					};
				}
			}

			/**
			 * Update local runtime state from an allowed access response
			 */
			function applyAllowedAccessResult(result) {
					// Get username from server response (constructed server-side for security)
					if (result.username) {
						constructedUsername = result.username;
					}
					
					// Get assets checksum for cache versioning
					if (result.assetsChecksum) {
						assetsChecksum = result.assetsChecksum;
					}
			}

			function stopPeriodicAccessChecks() {
				if (periodicAccessCheckTimer !== null) {
					clearInterval(periodicAccessCheckTimer);
					periodicAccessCheckTimer = null;
				}
			}

			function stopPlaytimeHeartbeat() {
				if (playtimeHeartbeatTimer !== null) {
					clearInterval(playtimeHeartbeatTimer);
					playtimeHeartbeatTimer = null;
				}
			}

			/**
			 * Send playtime heartbeat to worker (forwards to Netlify for daily limit tracking).
			 * Called every 5 minutes while the game is running.
			 */
			async function sendPlaytimeHeartbeat() {
				if (accessRevoked || !currentIdToken) return;
				try {
					await fetch(`${CONFIG.WORKER_URL}/playtime-heartbeat`, {
						method: 'POST',
						headers: { 'Content-Type': 'application/json' },
						body: JSON.stringify({
							idToken: currentIdToken,
							appId: CONFIG.APP_ID,
							minutesToAdd: 5
						})
					});
				} catch (err) {
					console.warn('Playtime heartbeat failed:', err);
				}
			}

			function startPlaytimeHeartbeat() {
				if (playtimeHeartbeatTimer !== null) return;
				// First heartbeat after 5 minutes (align with interval so we don't double-count the first minute)
				playtimeHeartbeatTimer = setInterval(() => {
					void sendPlaytimeHeartbeat();
				}, PLAYTIME_HEARTBEAT_INTERVAL_MS);
			}

			function handleAccessRevoked(reason) {
				if (accessRevoked) {
					return;
				}

				accessRevoked = true;
				stopPeriodicAccessChecks();
				stopPlaytimeHeartbeat();
				currentIdToken = null;
				currentUser = null;
				const encodedReason = encodeURIComponent(reason || 'Access denied');
				window.location.href = `/closed.html?reason=${encodedReason}`;
			}

			async function runPeriodicAccessCheck() {
				if (accessRevoked || !currentIdToken || periodicAccessCheckInFlight) {
					return;
				}

				periodicAccessCheckInFlight = true;
				try {
					const decision = await fetchAccessDecision(currentIdToken);

					if (decision.type === 'allowed') {
						transientAccessFailureCount = 0;
						applyAllowedAccessResult(decision.result);
						return;
					}

					if (decision.type === 'denied') {
						handleAccessRevoked(decision.reason);
						return;
					}

					// Fail-open on transient errors to avoid false kicks during outages
					transientAccessFailureCount += 1;
					console.warn('Periodic access check transient failure:', decision.reason);
				} finally {
					periodicAccessCheckInFlight = false;
				}
			}

			function startPeriodicAccessChecks() {
				if (periodicAccessCheckTimer !== null) {
					return;
				}

				periodicAccessCheckTimer = setInterval(() => {
					void runPeriodicAccessCheck();
				}, ACCESS_RECHECK_INTERVAL_MS);
			}

			/**
			 * Check access using Google ID token
			 */
			async function checkAccessWithToken(idToken) {
				// Store token for use in assets loading and periodic re-check
				currentIdToken = idToken;
				
				const decision = await fetchAccessDecision(idToken);

				if (decision.type === 'allowed') {
					applyAllowedAccessResult(decision.result);

					// Remove login overlay from DOM and prepare for game initialization
					const loginOverlay = document.getElementById('login-overlay');
					if (loginOverlay) {
						loginOverlay.remove();
					}
					
					// Focus the game container and window to ensure input works
					const gameFrame = document.getElementById('game_frame');
					if (gameFrame) {
						gameFrame.focus();
					}
					window.focus();
					
					if (!gameInitialized) {
						gameInitialized = true;
						// Use requestAnimationFrame + setTimeout to ensure browser is ready for input
						requestAnimationFrame(() => {
							setTimeout(() => {
								initializeGame();
							}, 100);
						});
					}

					startPeriodicAccessChecks();
					startPlaytimeHeartbeat();
					return;
				}

				if (decision.type === 'denied') {
					// Keep initial sign-in behavior for auth failures, but enforce explicit access denies.
					if (decision.result && decision.result.allowed === false) {
						handleAccessRevoked(decision.reason);
					} else {
						showError(decision.reason || 'Could not verify access. Please try again.');
						showLoading(false);
					}
					return;
				}

				showError(decision.reason || 'Could not verify access. Please try again.');
				showLoading(false);
			}

			/**
			 * Parse JWT token (client-side, for display only)
			 */
			function parseJwt(token) {
				const base64Url = token.split('.')[1];
				const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
				const jsonPayload = decodeURIComponent(atob(base64).split('').map(function(c) {
					return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
				}).join(''));
				return JSON.parse(jsonPayload);
			}

			/**
			 * Show/hide loading state
			 */
			function showLoading(show) {
				const el = document.getElementById('login-loading');
				if (el) el.style.display = show ? 'block' : 'none';
			}

			/**
			 * Show error message
			 */
			function showError(message) {
				const el = document.getElementById('login-error');
				if (el) {
					el.textContent = message;
					el.style.display = 'block';
				}
			}

			/**
			 * Hide error message
			 */
			function hideError() {
				const el = document.getElementById('login-error');
				if (el) el.style.display = 'none';
			}

			/**
			 * Initialize the game
			 */
			function initializeGame() {
				if (window.location.href.indexOf("file:") === 0) {
					alert("HTTP please, do not open this file locally, run a local HTTP server and load it via HTTP");
					return;
				}

				// iPad "Request Desktop": use fixed mobile-sized viewport so touch button size matches mobile (no scale = no coordinate issues).
				if (isIPadDesktopMode()) {
					applyMobileViewportForIPadDesktop();
				}

				var relayId = Math.floor(Math.random() * 2);
				
				// Construct assets URI with authentication token and checksum for cache versioning
				let assetsURI;
				if (currentIdToken) {
					const baseUrl = `${CONFIG.WORKER_URL}/assets22.epk?token=${encodeURIComponent(currentIdToken)}`;
					// Append hash parameter if checksum is available (for cache versioning)
					assetsURI = assetsChecksum 
						? `${baseUrl}&hash=${encodeURIComponent(assetsChecksum)}`
						: baseUrl;
				} else {
					assetsURI = "assets22.epk"; // Fallback if no token (shouldn't happen)
				}
				
				// When we force a fixed viewport (iPad desktop mode), game must use container size not window.visualViewport
				const useFixedViewport = isIPadDesktopMode();
				window.eaglercraftXOpts = {
					demoMode: false,
					container: "game_frame",
					assetsURI: assetsURI,
					localesURI: "lang/",
					worldsDB: "worlds",
					servers: [
					//	{ addr: "wss://40d95f33cdab.ngrok-free.app", name: "Scratchmasterj21 server" }
					{ addr: "wss://0ef5-150-230-221-162.ngrok-free.app", name: "Scratchmasterj21 server" }
					],
					relays: [
						{ addr: "wss://4ede-150-230-221-162.ngrok-free.app", comment: "scratchmasterj21 #2", primary: relayId == 0 },
					],
					forceProfanityFilter: true,
					allowBootMenu: false,
					showBootMenuOnLaunch: false,
					enableMinceraft: false,
					allowServerRedirects: false,
					allowUpdateDL: false,
					checkGLErrors: false,
                    checkShaderGLErrors: false,
					deobfStackTraces: false,
					allowFNAWSkins: true,
					useVisualViewport: !useFixedViewport,
					html5CursorSupport: true,
					eaglerNoDelay: true,
					username: constructedUsername || 'Player'
				};

				var q = window.location.search;
				if ((typeof q === "string") && q[0] === "?" && (typeof window.URLSearchParams !== "undefined")) {
					q = new window.URLSearchParams(q);
					var s = q.get("server");
					if (s) window.eaglercraftXOpts.joinServer = s;
				}

				main(); // Start the game
			}

			// Check for mobile devices and initialize on page load
			window.addEventListener('load', function() {
				// Check if device is mobile/tablet and block access - COMMENTED OUT to try mobile controls
				// if (isMobileDevice()) {
				// 	showDeviceBlockMessage();
				// 	return; // Don't initialize Google Sign-In
				// }
				
				// Device is desktop/laptop, proceed with initialization
				initGoogleSignIn();
			});
		</script>
		<script>
			window.onbeforeunload = null;
			window.addEventListener("beforeunload", function (event) {
				stopPeriodicAccessChecks();
				stopPlaytimeHeartbeat();
				event.stopImmediatePropagation();
			}, true);
		</script>

				<p class="login-subtitle">Sign in with your school account to play</p>
				<div class="school-badge">🏫 @felice.ed.jp accounts only</div>
				<div id="google-signin-btn"></div>
				<div id="login-loading" class="login-loading">Verifying access</div>
				<div id="login-error" class="login-error"></div>
			</div>
		</div>
		
		<!-- Game Container -->
		<div id="game_frame" style="width:100%;height:100%;" tabindex="-1"></div>

		<style>

		<script>
			// ============================================
			// CONFIGURATION - Replace with your values
			// ============================================
			const CONFIG = {
				// TODO: Replace with your Google OAuth Client ID from Google Cloud Console
				GOOGLE_CLIENT_ID: '313123590702-lb7fjsbbqt83t3ljocvpf5la58uqmir4.apps.googleusercontent.com',
				
				// Your Cloudflare Worker endpoint
				WORKER_URL: 'https://checkaccess.carlo587-jcl.workers.dev',
				
				// App ID for access rules
				APP_ID: 'minecraft',
				
				// Allowed email domain
				ALLOWED_DOMAIN: 'felice.ed.jp'
			};
			// ============================================

			let gameInitialized = false;
			let currentUser = null;

			/**
			 * Get Google Auth username components from localStorage
			 */
			function getGoogleAuthData() {
				try {
					const stored = localStorage.getItem('google_auth_data');
					if (stored) {
						return JSON.parse(stored);
					}
				} catch (e) {
					console.error('Error reading Google Auth data:', e);
				}
				return null;
			}

			/**
			 * Store Google Auth data in localStorage
			 */
			function storeGoogleAuthData(givenName, familyName, sub) {
				try {
					const authData = {
						given_name: givenName || '',
						family_name: familyName || '',
						sub: sub || ''
					};
					console.log('[Google Auth] Storing auth data:', authData);
					localStorage.setItem('google_auth_data', JSON.stringify(authData));
					console.log('[Google Auth] Auth data stored successfully');
				} catch (e) {
					console.error('[Google Auth] Error storing Google Auth data:', e);
				}
			}

			/**
			 * Generate username from Google Auth data
			 */
			function generateUsername() {
				const authData = getGoogleAuthData();
				console.log('[Username] Getting auth data:', authData);
				if (authData) {
					// Get last 4 digits of sub
					const sub = authData.sub || '';
					const subLast4 = sub.length >= 4 ? sub.substring(sub.length - 4) : sub;
					const username = (authData.given_name || '') + (authData.family_name || '') + subLast4;
					console.log('[Username] Generated username:', username, '(sub last 4:', subLast4 + ')');
					return username;
				}
				console.warn('[Username] No auth data found, returning null');
				return null;
			}

			/**
			 * Decompress GZIP data synchronously (data is base64 string, returns decompressed string)
			 */
			function decompressGzipSync(base64Data) {
				try {
					console.log('[GZIP] Starting decompression, input length:', base64Data.length);
					
					// Decode base64 to binary
					const binaryString = atob(base64Data);
					console.log('[GZIP] Base64 decoded, binary string length:', binaryString.length);
					
					const bytes = new Uint8Array(binaryString.length);
					for (let i = 0; i < binaryString.length; i++) {
						bytes[i] = binaryString.charCodeAt(i);
					}
					console.log('[GZIP] Converted to Uint8Array, length:', bytes.length);
					console.log('[GZIP] First 20 bytes:', Array.from(bytes.slice(0, 20)));
					
					// Use pako for synchronous decompression
					if (typeof pako !== 'undefined') {
						console.log('[GZIP] Using pako to decompress...');
						// Get as Uint8Array (binary)
						const decompressedBytes = pako.inflate(bytes);
						console.log('[GZIP] Decompression successful, output length:', decompressedBytes.length);
						console.log('[GZIP] First 50 bytes:', Array.from(decompressedBytes.slice(0, 50)));
						
						// Try to decode as UTF-8 string to check if it's text/JSON
						let decompressedString = '';
						try {
							decompressedString = new TextDecoder('utf-8', { fatal: true }).decode(decompressedBytes);
							console.log('[GZIP] Decoded as UTF-8 string, length:', decompressedString.length);
							console.log('[GZIP] First 200 chars:', decompressedString.substring(0, 200));
							
							// Check if it's JSON
							if (decompressedString.trim().startsWith('{') || decompressedString.trim().startsWith('[')) {
								console.log('[GZIP] Appears to be JSON text');
								return decompressedString;
							} else {
								console.warn('[GZIP] Does not appear to be JSON, returning as binary string');
								// Return as binary string representation for binary manipulation
								return { binary: decompressedBytes, isBinary: true };
							}
						} catch (e) {
							console.warn('[GZIP] UTF-8 decode failed, data is binary:', e.message);
							// Return as binary
							return { binary: decompressedBytes, isBinary: true };
						}
					} else {
						console.error('[GZIP] Pako library not loaded! Cannot decompress.');
						throw new Error('Pako library required for GZIP decompression');
					}
				} catch (e) {
					console.error('[GZIP] Decompression error:', e);
					console.error('[GZIP] Error name:', e.name);
					console.error('[GZIP] Error message:', e.message);
					throw e;
				}
			}

			/**
			 * Compress data to GZIP synchronously (string input, returns base64 string)
			 */
			function compressGzipSync(dataString) {
				try {
					// Use pako for synchronous compression
					if (typeof pako !== 'undefined') {
						const compressed = pako.gzip(dataString);
						// Convert to base64
						let binaryString = '';
						for (let i = 0; i < compressed.length; i++) {
							binaryString += String.fromCharCode(compressed[i]);
						}
						return btoa(binaryString);
					} else {
						console.error('[GZIP] Pako library not loaded! Cannot compress.');
						throw new Error('Pako library required for GZIP compression');
					}
				} catch (e) {
					console.error('[GZIP] Compression error:', e);
					throw e;
				}
			}

			/**
			 * Initialize Google Sign-In when the library loads
			 */
			function initGoogleSignIn() {
				if (typeof google === 'undefined') {
					// Google library not loaded yet, retry
					setTimeout(initGoogleSignIn, 100);
					return;
				}

				google.accounts.id.initialize({
					client_id: CONFIG.GOOGLE_CLIENT_ID,
					callback: handleGoogleSignIn,
					auto_select: true,  // Auto sign-in if user previously signed in
					cancel_on_tap_outside: false
				});

				// Render the sign-in button
				google.accounts.id.renderButton(
					document.getElementById('google-signin-btn'),
					{
						theme: 'filled_blue',
						size: 'large',
						text: 'signin_with',
						shape: 'rectangular',
						width: 280
					}
				);

				// Also show One Tap prompt
				google.accounts.id.prompt();
			}

			/**
			 * Handle Google Sign-In callback
			 */
			async function handleGoogleSignIn(response) {
				showLoading(true);
				hideError();

				try {
					// Decode the JWT to get user info (for display only - verification happens server-side)
					const payload = parseJwt(response.credential);
					
					// Quick client-side domain check (server will verify too)
					if (!payload.email.endsWith('@' + CONFIG.ALLOWED_DOMAIN)) {
						showError(`Only @${CONFIG.ALLOWED_DOMAIN} accounts are allowed`);
						showLoading(false);
						return;
					}

					currentUser = {
						email: payload.email,
						name: payload.name,
						picture: payload.picture,
						idToken: response.credential
					};

					// Store Google Auth data for username generation
					console.log('[Google Sign-In] Payload received:', {
						given_name: payload.given_name,
						family_name: payload.family_name,
						sub: payload.sub
					});
					storeGoogleAuthData(payload.given_name, payload.family_name, payload.sub);

					// Check access with the worker
					await checkAccessWithToken(response.credential);

				} catch (err) {
					console.error('Sign-in error:', err);
					showError('Sign-in failed. Please try again.');
					showLoading(false);
				}
			}

			/**
			 * Check access using Google ID token
			 */
			async function checkAccessWithToken(idToken) {
				try {
					const response = await fetch(`${CONFIG.WORKER_URL}/check-access`, {
						method: 'POST',
						headers: { 'Content-Type': 'application/json' },
						body: JSON.stringify({
							idToken: idToken,
							appId: CONFIG.APP_ID,
							timezone: Intl.DateTimeFormat().resolvedOptions().timeZone
						})
					});

					const result = await response.json();

					if (result.error) {
						showError(result.message || result.error);
						showLoading(false);
						return;
					}

					if (result.allowed) {
						// Hide login overlay and start game
						document.getElementById('login-overlay').style.display = 'none';
						if (!gameInitialized) {
							gameInitialized = true;
							initializeGame();
						}
					} else {
						// Redirect to closed page with reason
						const reason = encodeURIComponent(result.reason || 'Access denied');
						window.location.href = `/closed.html?reason=${reason}`;
					}

				} catch (err) {
					console.error('Access check error:', err);
					showError('Could not verify access. Please try again.');
					showLoading(false);
				}
			}

			/**
			 * Parse JWT token (client-side, for display only)
			 */
			function parseJwt(token) {
				const base64Url = token.split('.')[1];
				const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
				const jsonPayload = decodeURIComponent(atob(base64).split('').map(function(c) {
					return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
				}).join(''));
				return JSON.parse(jsonPayload);
			}

			/**
			 * Show/hide loading state
			 */
			function showLoading(show) {
				const el = document.getElementById('login-loading');
				if (el) el.style.display = show ? 'block' : 'none';
			}

			/**
			 * Show error message
			 */
			function showError(message) {
				const el = document.getElementById('login-error');
				if (el) {
					el.textContent = message;
					el.style.display = 'block';
				}
			}

			/**
			 * Hide error message
			 */
			function hideError() {
				const el = document.getElementById('login-error');
				if (el) el.style.display = 'none';
			}

			/**
			 * Initialize the game
			 */
			function initializeGame() {
				if (window.location.href.indexOf("file:") === 0) {
					alert("HTTP please, do not open this file locally, run a local HTTP server and load it via HTTP");
					return;
				}

				var relayId = Math.floor(Math.random() * 2);
				
				// Get the forced username
				console.log('[Game Init] Generating forced username...');
				const forcedUsername = generateUsername();
				console.log('[Game Init] Forced username:', forcedUsername);
				
				// Function to find and replace username in binary NBT data
				function updateUsernameInBinary(binaryData, newUsername) {
					// Convert username to UTF-8 bytes
					const usernameBytes = new TextEncoder().encode(newUsername);
					const usernameLength = usernameBytes.length;
					
					// Look for "username" string in the binary data
					const usernameMarker = new TextEncoder().encode('username');
					let usernamePos = -1;
					
					// Search for "username" marker
					for (let i = 0; i <= binaryData.length - usernameMarker.length; i++) {
						let found = true;
						for (let j = 0; j < usernameMarker.length; j++) {
							if (binaryData[i + j] !== usernameMarker[j]) {
								found = false;
								break;
							}
						}
						if (found) {
							usernamePos = i;
							break;
						}
					}
					
					if (usernamePos === -1) {
						console.error('[Profile] Could not find "username" marker in binary data');
						return null;
					}
					
					console.log('[Profile] Found "username" at position:', usernamePos);
					
					// In NBT format, after the tag name comes:
					// 1. Tag type byte (8 = String)
					// 2. 2-byte length (big-endian, unsigned)
					// 3. The string data (UTF-8)
					
					const tagNameEnd = usernamePos + usernameMarker.length;
					const typeBytePos = tagNameEnd;
					const lengthPos = typeBytePos + 1;
					
					console.log('[Profile] Tag name ends at:', tagNameEnd);
					console.log('[Profile] Type byte at:', typeBytePos, 'value:', binaryData[typeBytePos]);
					console.log('[Profile] Length bytes at:', lengthPos, 'values:', binaryData[lengthPos], binaryData[lengthPos + 1]);
					
					// Read 2-byte length as big-endian unsigned (NBT uses big-endian)
					const currentLength = (binaryData[lengthPos] << 8) | binaryData[lengthPos + 1];
					console.log('[Profile] Current username length (big-endian):', currentLength);
					
					// Validate length is reasonable (not > 1000 or negative when interpreted as signed)
					if (currentLength > 1000 || currentLength < 0) {
						// Try little-endian
						const currentLengthLE = binaryData[lengthPos] | (binaryData[lengthPos + 1] << 8);
						console.log('[Profile] Trying little-endian, length:', currentLengthLE);
						if (currentLengthLE > 0 && currentLengthLE < 1000) {
							// Use little-endian
							const oldDataStart = lengthPos + 2;
							const oldDataEnd = oldDataStart + currentLengthLE;
							
							if (oldDataEnd > binaryData.length) {
								console.error('[Profile] Calculated end position exceeds data length');
								return null;
							}
							
							// Create new binary data with updated username
							const lengthDiff = usernameLength - currentLengthLE;
							const newBinary = new Uint8Array(binaryData.length + lengthDiff);
							
							// Copy data before length
							newBinary.set(binaryData.slice(0, lengthPos), 0);
							
							// Write new length (2 bytes, little-endian)
							newBinary[lengthPos] = usernameLength & 0xFF;
							newBinary[lengthPos + 1] = (usernameLength >> 8) & 0xFF;
							
							// Write new username
							newBinary.set(usernameBytes, lengthPos + 2);
							
							// Copy data after old username
							newBinary.set(binaryData.slice(oldDataEnd), lengthPos + 2 + usernameLength);
							
							console.log('[Profile] Updated binary data (little-endian), new length:', newBinary.length);
							return newBinary;
						}
						console.error('[Profile] Invalid length value:', currentLength);
						return null;
					}
					
					// Length is valid, use big-endian
					const oldDataStart = lengthPos + 2;
					const oldDataEnd = oldDataStart + currentLength;
					
					if (oldDataEnd > binaryData.length) {
						console.error('[Profile] Calculated end position exceeds data length');
						return null;
					}
					
					// Create new binary data with updated username
					const lengthDiff = usernameLength - currentLength;
					const newBinary = new Uint8Array(binaryData.length + lengthDiff);
					
					// Copy data before length
					newBinary.set(binaryData.slice(0, lengthPos), 0);
					
					// Write new length (2 bytes, big-endian)
					newBinary[lengthPos] = (usernameLength >> 8) & 0xFF;
					newBinary[lengthPos + 1] = usernameLength & 0xFF;
					
					// Write new username
					newBinary.set(usernameBytes, lengthPos + 2);
					
					// Copy data after old username
					newBinary.set(binaryData.slice(oldDataEnd), lengthPos + 2 + usernameLength);
					
					console.log('[Profile] Updated binary data (big-endian), new length:', newBinary.length);
					return newBinary;
				}
				
				// Function to decompress/parse profile data (handles both compressed and uncompressed)
				function parseProfileData(profileData) {
					try {
						// Try GZIP decompression first
						const decompressed = decompressGzipSync(profileData);
						
						// Check if it's binary data
						if (decompressed.isBinary) {
							console.log('[Profile] Data is binary format (NBT), length:', decompressed.binary.length);
							return { 
								data: decompressed.binary, 
								wasCompressed: true, 
								raw: decompressed.binary,
								isBinary: true 
							};
						}
						
						// Try to parse as JSON
						try {
							const parsed = JSON.parse(decompressed);
							console.log('[Profile] Successfully parsed decompressed JSON');
							return { data: parsed, wasCompressed: true, raw: decompressed, isBinary: false };
						} catch (parseError) {
							console.warn('[Profile] Decompressed data is not valid JSON, trying direct decode:', parseError.message);
							// If JSON parse fails, try direct decode as fallback
							const directDecoded = atob(profileData);
							console.log('[Profile] Direct decoded length:', directDecoded.length);
							console.log('[Profile] Direct decoded (first 200 chars):', directDecoded.substring(0, 200));
							const parsed = JSON.parse(directDecoded);
							console.log('[Profile] Successfully parsed direct decoded JSON');
							return { data: parsed, wasCompressed: false, raw: directDecoded, isBinary: false };
						}
					} catch (e) {
						console.log('[Profile] GZIP decompression failed, trying direct decode:', e.message);
						// Fallback: try direct base64 decode
						try {
							const directDecoded = atob(profileData);
							console.log('[Profile] Direct decoded length:', directDecoded.length);
							console.log('[Profile] Direct decoded (first 200 chars):', directDecoded.substring(0, 200));
							const parsed = JSON.parse(directDecoded);
							console.log('[Profile] Successfully parsed direct decoded JSON');
							return { data: parsed, wasCompressed: false, raw: directDecoded, isBinary: false };
						} catch (e2) {
							console.error('[Profile] Both decompression methods failed');
							console.error('[Profile] GZIP error:', e);
							console.error('[Profile] Direct decode error:', e2);
							throw e2;
						}
					}
				}
				
				// Function to compress/encode profile data (matches original format)
				function encodeProfileData(profileData, wasCompressed, isBinary) {
					if (isBinary) {
						// It's binary data (Uint8Array)
						if (wasCompressed) {
							// Re-compress the binary data
							const compressed = pako.gzip(profileData);
							// Convert to base64
							let binaryString = '';
							for (let i = 0; i < compressed.length; i++) {
								binaryString += String.fromCharCode(compressed[i]);
							}
							return btoa(binaryString);
						} else {
							// Just base64 encode
							let binaryString = '';
							for (let i = 0; i < profileData.length; i++) {
								binaryString += String.fromCharCode(profileData[i]);
							}
							return btoa(binaryString);
						}
					} else {
						// It's JSON
						const jsonString = JSON.stringify(profileData);
						if (wasCompressed) {
							return compressGzipSync(jsonString);
						} else {
							return btoa(jsonString);
						}
					}
				}
				
				// Function to update profile username
				function updateProfileUsername(profileData) {
					const username = forcedUsername || generateUsername();
					if (!username) {
						console.warn('[Profile] No username available for update');
						return profileData;
					}
					
					try {
						console.log('[Profile] Updating profile username to:', username);
						const parsed = parseProfileData(profileData);
						
						if (parsed.isBinary) {
							// Handle binary NBT format
							console.log('[Profile] Processing binary NBT format');
							const updatedBinary = updateUsernameInBinary(parsed.data, username);
							if (!updatedBinary) {
								console.error('[Profile] Failed to update binary data');
								return profileData;
							}
							const newData = encodeProfileData(updatedBinary, parsed.wasCompressed, true);
							console.log('[Profile] Successfully updated binary profile!');
							return newData;
						} else {
							// Handle JSON format
							const profile = parsed.data;
							console.log('[Profile] Current username:', profile.username);
							if (profile.username === username) {
								console.log('[Profile] Username already correct, no update needed');
								return profileData;
							}
							profile.username = username;
							console.log('[Profile] New username set to:', profile.username);
							const newData = encodeProfileData(profile, parsed.wasCompressed, false);
							console.log('[Profile] Successfully updated JSON profile!');
							return newData;
						}
					} catch (e) {
						console.error('[Profile] Error updating profile:', e);
						console.error('[Profile] Error stack:', e.stack);
						return profileData; // Return original if error
					}
				}
				
				// Check what keys exist in localStorage
				console.log('[Game Init] Checking localStorage keys...');
				for (let i = 0; i < localStorage.length; i++) {
					const key = localStorage.key(i);
					console.log('[Game Init] localStorage key:', key, 'value preview:', localStorage.getItem(key)?.substring(0, 50));
					if (key === 'p' || key.includes('profile') || key.includes('username')) {
						console.log('[Game Init] Found potential profile key:', key);
					}
				}
				
				// Check if "p" key already exists and update it immediately
				const existingP = localStorage.getItem('p');
				if (existingP) {
					console.log('[Profile] Found existing "p" key, updating immediately...');
					const updated = updateProfileUsername(existingP);
					if (updated !== existingP) {

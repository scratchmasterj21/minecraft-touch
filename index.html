<!DOCTYPE html>
<html style="width:100%;height:100%;background-color:black;">
	<head>

		<!-- Game code -->
		<script type="text/javascript" src="classes.js"></script>

		<style>
			/* Login overlay styles */
			#login-overlay {
				position: fixed;
				top: 0;
				left: 0;
				width: 100%;
				height: 100%;
				background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
				display: flex;
				flex-direction: column;
				justify-content: center;
				align-items: center;
				z-index: 9999;
				font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
			}
			
			.login-container {
				background: rgba(255, 255, 255, 0.05);
				backdrop-filter: blur(10px);
				border-radius: 20px;
				padding: 40px 50px;
				text-align: center;
				border: 1px solid rgba(255, 255, 255, 0.1);
				box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
			}
			
			.login-title {
				color: #4ade80;
				font-size: 2.5rem;
				margin-bottom: 10px;
				text-shadow: 0 0 20px rgba(74, 222, 128, 0.3);
			}
			
			.login-subtitle {
				color: #94a3b8;
				font-size: 1rem;

			.school-badge {
				background: rgba(74, 222, 128, 0.1);
				border: 1px solid rgba(74, 222, 128, 0.3);
				border-radius: 8px;

			#google-signin-btn {
				margin: 20px auto;
			}
			
			.login-error {
				color: #f87171;
				background: rgba(248, 113, 113, 0.1);
				border: 1px solid rgba(248, 113, 113, 0.3);
				border-radius: 8px;
				padding: 12px 20px;
				margin-top: 20px;
				display: none;
				font-size: 0.9rem;
			}
			
			.login-loading {
				color: #60a5fa;
				margin-top: 20px;
				display: none;
				font-size: 0.9rem;
			}
			
			.login-loading::after {
				content: '';
				animation: dots 1.5s infinite;

			@keyframes dots {
				0%, 20% { content: '.'; }
				40% { content: '..'; }

		<script>
			// ============================================
			// CONFIGURATION - Replace with your values
			// ============================================
			const CONFIG = {
				// TODO: Replace with your Google OAuth Client ID from Google Cloud Console
				GOOGLE_CLIENT_ID: '313123590702-lb7fjsbbqt83t3ljocvpf5la58uqmir4.apps.googleusercontent.com',
				
				// Your Cloudflare Worker endpoint
				WORKER_URL: 'https://checkaccess.carlo587-jcl.workers.dev',
				
				// App ID for access rules
				APP_ID: 'minecraft',
				
				// Allowed email domain
				ALLOWED_DOMAIN: 'felice.ed.jp'
			};
			// ============================================

			let gameInitialized = false;
			let currentUser = null;

			/**
			 * Get Google Auth username components from localStorage
			 */
			function getGoogleAuthData() {
				try {
					const stored = localStorage.getItem('google_auth_data');
					if (stored) {
						return JSON.parse(stored);
					}
				} catch (e) {
					console.error('Error reading Google Auth data:', e);
				}
				return null;
			}

			/**
			 * Store Google Auth data in localStorage
			 */
			function storeGoogleAuthData(givenName, familyName, sub) {
				try {
					const authData = {
						given_name: givenName || '',
						family_name: familyName || '',
						sub: sub || ''
					};
					console.log('[Google Auth] Storing auth data:', authData);
					localStorage.setItem('google_auth_data', JSON.stringify(authData));
					console.log('[Google Auth] Auth data stored successfully');
				} catch (e) {
					console.error('[Google Auth] Error storing Google Auth data:', e);
				}
			}

			/**
			 * Generate username from Google Auth data
			 */
			function generateUsername() {
				const authData = getGoogleAuthData();
				console.log('[Username] Getting auth data:', authData);
				if (authData) {
					// Get last 4 digits of sub
					const sub = authData.sub || '';
					const subLast4 = sub.length >= 4 ? sub.substring(sub.length - 4) : sub;
					const username = (authData.given_name || '') + (authData.family_name || '') + subLast4;
					console.log('[Username] Generated username:', username, '(sub last 4:', subLast4 + ')');
					return username;
				}
				console.warn('[Username] No auth data found, returning null');
				return null;
			}

			/**
			 * Decompress GZIP data synchronously (data is base64 string, returns decompressed string)
			 */
			function decompressGzipSync(base64Data) {
				try {
					// Decode base64 to binary
					const binaryString = atob(base64Data);
					const bytes = new Uint8Array(binaryString.length);
					for (let i = 0; i < binaryString.length; i++) {
						bytes[i] = binaryString.charCodeAt(i);
					}
					
					// Use pako for synchronous decompression
					if (typeof pako !== 'undefined') {
						const decompressed = pako.inflate(bytes, { to: 'string' });
						return decompressed;
					} else {
						console.error('[GZIP] Pako library not loaded! Cannot decompress.');
						throw new Error('Pako library required for GZIP decompression');
					}
				} catch (e) {
					console.error('[GZIP] Decompression error:', e);
					throw e;
				}
			}

			/**
			 * Compress data to GZIP synchronously (string input, returns base64 string)
			 */
			function compressGzipSync(dataString) {
				try {
					// Use pako for synchronous compression
					if (typeof pako !== 'undefined') {
						const compressed = pako.gzip(dataString);
						// Convert to base64
						let binaryString = '';
						for (let i = 0; i < compressed.length; i++) {
							binaryString += String.fromCharCode(compressed[i]);
						}
						return btoa(binaryString);
					} else {
						console.error('[GZIP] Pako library not loaded! Cannot compress.');
						throw new Error('Pako library required for GZIP compression');
					}
				} catch (e) {
					console.error('[GZIP] Compression error:', e);
					throw e;
				}
			}

			/**
			 * Initialize Google Sign-In when the library loads
			 */
			function initGoogleSignIn() {
				if (typeof google === 'undefined') {
					// Google library not loaded yet, retry
					setTimeout(initGoogleSignIn, 100);
					return;
				}

				google.accounts.id.initialize({
					client_id: CONFIG.GOOGLE_CLIENT_ID,
					callback: handleGoogleSignIn,
					auto_select: true,  // Auto sign-in if user previously signed in
					cancel_on_tap_outside: false
				});

				// Render the sign-in button
				google.accounts.id.renderButton(
					document.getElementById('google-signin-btn'),
					{
						theme: 'filled_blue',
						size: 'large',
						text: 'signin_with',
						shape: 'rectangular',
						width: 280
					}
				);

				// Also show One Tap prompt
				google.accounts.id.prompt();
			}

			/**
			 * Handle Google Sign-In callback
			 */
			async function handleGoogleSignIn(response) {
				showLoading(true);
				hideError();

				try {
					// Decode the JWT to get user info (for display only - verification happens server-side)
					const payload = parseJwt(response.credential);
					
					// Quick client-side domain check (server will verify too)
					if (!payload.email.endsWith('@' + CONFIG.ALLOWED_DOMAIN)) {
						showError(`Only @${CONFIG.ALLOWED_DOMAIN} accounts are allowed`);
						showLoading(false);
						return;
					}

					currentUser = {
						email: payload.email,
						name: payload.name,
						picture: payload.picture,
						idToken: response.credential
					};

					// Store Google Auth data for username generation
					console.log('[Google Sign-In] Payload received:', {
						given_name: payload.given_name,
						family_name: payload.family_name,
						sub: payload.sub
					});
					storeGoogleAuthData(payload.given_name, payload.family_name, payload.sub);

					// Check access with the worker
					await checkAccessWithToken(response.credential);

				} catch (err) {
					console.error('Sign-in error:', err);
					showError('Sign-in failed. Please try again.');
					showLoading(false);
				}
			}

			/**
			 * Check access using Google ID token
			 */
			async function checkAccessWithToken(idToken) {
				try {
					const response = await fetch(`${CONFIG.WORKER_URL}/check-access`, {
						method: 'POST',
						headers: { 'Content-Type': 'application/json' },
						body: JSON.stringify({
							idToken: idToken,
							appId: CONFIG.APP_ID,
							timezone: Intl.DateTimeFormat().resolvedOptions().timeZone
						})
					});

					const result = await response.json();

					if (result.error) {
						showError(result.message || result.error);
						showLoading(false);
						return;
					}

					if (result.allowed) {
						// Hide login overlay and start game
						document.getElementById('login-overlay').style.display = 'none';
						if (!gameInitialized) {
							gameInitialized = true;
							initializeGame();
						}
					} else {
						// Redirect to closed page with reason
						const reason = encodeURIComponent(result.reason || 'Access denied');
						window.location.href = `/closed.html?reason=${reason}`;
					}

				} catch (err) {
					console.error('Access check error:', err);
					showError('Could not verify access. Please try again.');
					showLoading(false);
				}
			}

			/**
			 * Parse JWT token (client-side, for display only)
			 */
			function parseJwt(token) {
				const base64Url = token.split('.')[1];
				const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
				const jsonPayload = decodeURIComponent(atob(base64).split('').map(function(c) {
					return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
				}).join(''));
				return JSON.parse(jsonPayload);
			}

			/**
			 * Show/hide loading state
			 */
			function showLoading(show) {
				const el = document.getElementById('login-loading');
				if (el) el.style.display = show ? 'block' : 'none';
			}

			/**
			 * Show error message
			 */
			function showError(message) {
				const el = document.getElementById('login-error');
				if (el) {
					el.textContent = message;
					el.style.display = 'block';
				}
			}

			/**
			 * Hide error message
			 */
			function hideError() {
				const el = document.getElementById('login-error');
				if (el) el.style.display = 'none';
			}

			/**
			 * Initialize the game
			 */
			function initializeGame() {
				if (window.location.href.indexOf("file:") === 0) {
					alert("HTTP please, do not open this file locally, run a local HTTP server and load it via HTTP");
					return;
				}

				var relayId = Math.floor(Math.random() * 2);
				
				// Get the forced username
				console.log('[Game Init] Generating forced username...');
				const forcedUsername = generateUsername();
				console.log('[Game Init] Forced username:', forcedUsername);
				
				// Check what keys exist in localStorage
				console.log('[Game Init] Checking localStorage keys...');
				for (let i = 0; i < localStorage.length; i++) {
					const key = localStorage.key(i);
					console.log('[Game Init] localStorage key:', key, 'value preview:', localStorage.getItem(key)?.substring(0, 50));
					if (key === 'p' || key.includes('profile') || key.includes('username')) {
						console.log('[Game Init] Found potential profile key:', key);
					}
				}
				
				// Intercept localStorage.setItem to catch when "p" key is created
				const originalSetItem = localStorage.setItem.bind(localStorage);
				localStorage.setItem = function(key, value) {
					// Call original first
					originalSetItem(key, value);
					
					// If it's the "p" key, force username update
					if (key === 'p') {
						console.log('[Intercept] Caught localStorage.setItem for key "p"!');
						const username = forcedUsername || generateUsername();
						if (username) {
							try {
								console.log('[Intercept] Forcing username update...');
								const decompressedData = decompressGzipSync(value);
								const profile = JSON.parse(decompressedData);
								console.log('[Intercept] Current username:', profile.username);
								profile.username = username;
								console.log('[Intercept] Setting username to:', profile.username);
								const newData = compressGzipSync(JSON.stringify(profile));
								originalSetItem(key, newData);
								console.log('[Intercept] Successfully updated profile username!');
							} catch (e) {
								console.error('[Intercept] Error updating profile:', e);
							}
						}
					}
				};
				
				window.eaglercraftXOpts = {
					demoMode: false,
					container: "game_frame",
					assetsURI: "assets1.epk",
					localesURI: "lang/",
					worldsDB: "worlds",
					servers: [
						{ addr: "wss://514d-150-230-221-162.ngrok-free.app", name: "Scratchmasterj21 server" }
					],
					relays: [
						{ addr: "wss://mrelay.gfa-scratchlab.com/", comment: "scratchmasterj21 #2", primary: relayId == 0 },
					],
					forceProfanityFilter: true,
					allowBootMenu: false,
					showBootMenuOnLaunch: false,
					enableMinceraft: false,
					allowServerRedirects: false,
					allowUpdateDL: false,
					hooks: {
						/**
						 * Hook called when localStorage is saved
						 * Intercepts the "p" key (player profile) and forces username
						 */
						localStorageSaved: function(key, data) {
							console.log('[Hook] localStorageSaved called with key:', key, 'data type:', typeof data, 'data length:', data ? data.length : 0);
							
							if (key === 'p') {
								// Get username (use forcedUsername from closure, or regenerate if needed)
								const username = forcedUsername || generateUsername();
								console.log('[Hook] localStorageSaved - Username to force:', username);
								if (username) {
									try {
										console.log('[Hook] localStorageSaved - Decompressing GZIP data...');
										// Decompress GZIP data synchronously
										const decompressedData = decompressGzipSync(data);
										console.log('[Hook] localStorageSaved - Decompressed data (first 200 chars):', decompressedData.substring(0, 200));
										// Parse JSON
										const profile = JSON.parse(decompressedData);
										console.log('[Hook] localStorageSaved - Profile structure:', Object.keys(profile));
										console.log('[Hook] localStorageSaved - Current username:', profile.username);
										// Force username to Google Auth format
										profile.username = username;
										console.log('[Hook] localStorageSaved - New username set to:', profile.username);
										// Re-compress and encode synchronously
										const newData = compressGzipSync(JSON.stringify(profile));
										console.log('[Hook] localStorageSaved - Re-compressed data length:', newData.length);
										// Save to localStorage (game already saved, but we overwrite with modified version)
										localStorage.setItem(key, newData);
										console.log('[Hook] localStorageSaved - Successfully saved modified profile to localStorage');
									} catch (e) {
										console.error('[Hook] localStorageSaved - Error:', e);
										console.error('[Hook] localStorageSaved - Error stack:', e.stack);
										// If there's an error, the game already saved the original data, so we're fine
									}
								} else {
									console.warn('[Hook] localStorageSaved - No username available, skipping');
								}
							}
						},
						/**
						 * Hook called when localStorage is loaded
						 * Intercepts the "p" key (player profile) and forces username
						 */
						localStorageLoaded: function(key) {
							console.log('[Hook] localStorageLoaded called with key:', key);
							
							if (key === 'p') {
								// Get username (use forcedUsername from closure, or regenerate if needed)
								const username = forcedUsername || generateUsername();
								console.log('[Hook] localStorageLoaded - Username to force:', username);
								if (username) {
									try {
										// Load the data from localStorage
										const data = localStorage.getItem(key);
										console.log('[Hook] localStorageLoaded - Data from localStorage exists:', !!data, 'length:', data ? data.length : 0);
										if (data) {
											try {
												console.log('[Hook] localStorageLoaded - Decompressing GZIP data...');
												// Decompress GZIP data synchronously
												const decompressedData = decompressGzipSync(data);
												console.log('[Hook] localStorageLoaded - Decompressed data (first 200 chars):', decompressedData.substring(0, 200));
												// Parse JSON
												const profile = JSON.parse(decompressedData);
												console.log('[Hook] localStorageLoaded - Profile structure:', Object.keys(profile));
												console.log('[Hook] localStorageLoaded - Current username:', profile.username);
												// Force username to Google Auth format
												profile.username = username;
												console.log('[Hook] localStorageLoaded - New username set to:', profile.username);
												// Re-compress and encode synchronously
												const newData = compressGzipSync(JSON.stringify(profile));
												console.log('[Hook] localStorageLoaded - Re-compressed data length:', newData.length);
												console.log('[Hook] localStorageLoaded - Returning modified data');
												return newData;
											} catch (e) {
												console.error('[Hook] localStorageLoaded - Error:', e);
												console.error('[Hook] localStorageLoaded - Error stack:', e.stack);
												// If there's an error, return null to let the game handle it
												return null;
											}
										} else {
											console.log('[Hook] localStorageLoaded - No data in localStorage for key "p", returning null');
										}
									} catch (e) {
										console.error('[Hook] localStorageLoaded - Error:', e);
										console.error('[Hook] localStorageLoaded - Error stack:', e.stack);
										// If there's an error, return null to let the game handle it
									}
								} else {
									console.warn('[Hook] localStorageLoaded - No username available, returning null');
								}
							}
							return null;
						}
					}
				};

				var q = window.location.search;
				if ((typeof q === "string") && q[0] === "?" && (typeof window.URLSearchParams !== "undefined")) {
					q = new window.URLSearchParams(q);
					var s = q.get("server");
					if (s) window.eaglercraftXOpts.joinServer = s;
				}

				main(); // Start the game
				
				// Monitor localStorage for profile creation and intercept when "p" key appears
				let checkCount = 0;
				const monitorInterval = setInterval(function() {
					checkCount++;
					const pKey = localStorage.getItem('p');
					if (pKey) {
						console.log('[Monitor] Key "p" found in localStorage! Length:', pKey.length, 'Check #:', checkCount);
						// Force update the username immediately
						const username = forcedUsername || generateUsername();
						if (username) {
							try {
								console.log('[Monitor] Forcing username update on existing profile...');
								const decompressedData = decompressGzipSync(pKey);
								const profile = JSON.parse(decompressedData);
								console.log('[Monitor] Current username:', profile.username);
								profile.username = username;
								console.log('[Monitor] Setting username to:', profile.username);
								const newData = compressGzipSync(JSON.stringify(profile));
								localStorage.setItem('p', newData);
								console.log('[Monitor] Successfully updated profile username!');
							} catch (e) {
								console.error('[Monitor] Error updating profile:', e);
							}
						}
						// Stop monitoring after we've found and updated it
						clearInterval(monitorInterval);
					} else if (checkCount % 10 === 0) {
						// Log every 20 seconds (10 checks * 2 seconds)
						console.log('[Monitor] Still waiting for "p" key... (check #' + checkCount + ')');
					}
				}, 2000);
				
				// Stop monitoring after 60 seconds
				setTimeout(function() {
					clearInterval(monitorInterval);
					console.log('[Monitor] Stopped monitoring for "p" key');
				}, 60000);
			}

			// Initialize Google Sign-In when page loads
			window.addEventListener('load', initGoogleSignIn);
		</script>
		<script>
			window.onbeforeunload = null;
			window.addEventListener("beforeunload", function (event) {
				event.stopImmediatePropagation();
			}, true);
		</script>
